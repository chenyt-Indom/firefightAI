rules:
- 当己方数量与敌方接近（比例在0.8-1.2倍之间）时，应该select(左路步兵反坦克侦察)，因为兵力均衡时需通过侦察获取情报优势，左路侦察可有效发现敌方反坦克单位并规避损失
- 当己方数量≥敌方4倍且己方数量≥20时，应该zoom_out(缩小视野确认敌旗位置)，因为大规模兵力优势下，快速终结战斗（夺旗）比逐步推进更能获得高额分数
- 当己方数量≥敌方3倍时, 应该zoom_out(缩小视野寻找敌方旗帜位置), 因为此时兵力绝对优势, 首要目标是快速定位敌方旗帜以夺取胜利, 而非纠缠于局部战斗
- 当己方数量≥敌方4倍时, 应该zoom_out(缩小视野寻找敌方旗帜位置), 因为兵力碾压优势下, 缩小视野能更高效地发现敌方核心目标, 避免在次要目标上浪费时间
- 当己方数量≥敌方5倍时, 应该zoom_out(缩小视野寻找敌方旗帜位置), 因为极端兵力优势下, 唯一可能失分的原因是找不到敌方旗帜, 扩大视野是最高效的决策
- 当己方数量≥敌方3倍时，应该执行zoom_out(缩小视野寻找敌方旗帜位置)，因为优势兵力下首要目标是快速定位敌方核心目标(旗帜)以取得决定性胜利，而非纠缠于局部战斗
- 当己方数量≥敌方4倍且友军数≥27时，应该执行zoom_out(缩小视野寻找敌方旗帜位置)，因为绝对兵力优势下，扩大视野获取全局信息能最大化利用兵力优势，避免在局部消耗战中浪费兵力
- 当己方数量≥敌方5倍时，应该执行zoom_out(缩小视野寻找敌方旗帜位置)，因为压倒性兵力优势下，直接定位并摧毁敌方旗帜是最优策略，可避免不必要的战斗损耗并快速结束战斗
- 当己方数量≥敌方4倍时，应该持续执行zoom_out(缩小视野寻找敌方旗帜位置)，因为兵力碾压优势下，每轮缩小视野搜索都能稳定获得40-100分，这是最高效的得分策略
- 当己方数量≥敌方5倍且友军数≥27时，应该优先执行zoom_out(缩小视野寻找敌方旗帜位置)，因为此时兵力绝对优势，缩小视野搜索的得分效率（每轮30-60分）远高于其他战术动作
