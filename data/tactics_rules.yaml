rules:
- 当己方数量与敌方数量之比在0.6至0.9之间时（如27:29~27:40），应派遣3个单位前出至(0.35,0.20)附近进行侦察推进，因为适度前出侦察可获取敌情并保持压力，但需避免过度深入导致侦察组被歼灭（如得分从+350骤降至+10以下）
- 当己方数量明显少于敌方（如18:53，比例约0.34）时，应派遣2个单位前出至中场(0.50,0.40)进行谨慎侦察，而非大规模推进，因为极端劣势下仅能维持有限侦察，主力需保持安全距离避免过早接敌
- 当己方数量与敌方数量接近（如27:29~27:30）且重复执行相同侦察推进指令时，得分会从+10迅速衰减至+0，因此不应连续使用相同战术，因为敌方会适应固定模式，需轮换侦察方向或调整兵力配置
- 当己方数量约为敌方数量的0.5倍时（如19:55、18:53），应该派遣2个单位前出至中场（0.50,0.40）进行侦察探测，因为此时正面决战风险极高，通过小规模前出获取敌情，可避免主力过早暴露，为后续战术调整争取空间，从而获得较高得分（+586、+362）。
- 当己方数量接近敌方数量（如27:29、25:40），且己方数量不低于敌方数量的0.6倍时，应该派遣3个单位前出向敌方方向推进至（0.35,0.20），因为此时兵力对比相对均衡，主动前出可压缩敌方活动空间、抢占有利地形，通过局部兵力优势获取战术主动权，从而稳定获得正分（+350、+256、+10等）。
- 当己方数量与敌方数量基本持平（如27:29、27:30），且连续执行相同前出行动后得分持续下降（从+350降至+10甚至+0）时，应该调整前出方向或改变战术，因为重复使用同一战术会被敌方适应，导致收益递减，需根据战场态势变化灵活调整侦察组规模或目标坐标以维持得分效率。
- 当己方数量与敌方数量之比在0.4至0.6之间（即己方明显劣势但非绝对劣势）时，应派遣2个单位前出至中场坐标(0.50,0.40)进行侦察探测，因为此条件下通过侦察获取敌情可有效规避正面硬拼，实现以少胜多或避免重大损失，高分案例（+362至+586）均采用此策略。
- 当己方数量与敌方数量之比接近1:1（即己方数量≥敌方0.9倍且≤敌方1.1倍）时，应派遣3个单位向敌方方向推进至坐标(0.35,0.20)进行主动探测，因为兵力对等时主动前出侦察可抢占先机、压缩敌方活动空间，虽然得分波动较大（+10至+350），但整体为正收益，且多次重复执行（案例5-19）表明此行动在均势下具有稳定战术价值。
- 当己方数量与敌方数量之比高于1.2（即己方数量≥敌方1.2倍）时，应派遣2-3个单位前出至中场或敌方方向进行侦察，并保持主力与侦察组距离在0.15以上，因为优势兵力下通过侦察引导主力分割包围可最大化战果，案例中高得分（+256至+586）均出现在此兵力比条件下。
